<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeAI — Intelligent Screening System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #0F1923;
    --navy-mid:   #162230;
    --navy-card:  #1C2D3D;
    --navy-border:#243649;
    --teal:       #00D4AA;
    --teal-dim:   #00A882;
    --teal-glow:  rgba(0,212,170,0.15);
    --red:        #FF4757;
    --red-dim:    #CC3844;
    --red-glow:   rgba(255,71,87,0.15);
    --amber:      #FFB830;
    --text:       #E8EDF2;
    --text-muted: #7A95AB;
    --mono:       'JetBrains Mono', monospace;
    --sans:       'Inter', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--navy-border);
    background: var(--navy-mid);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--teal);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-text span { color: var(--teal); }

  .header-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--teal);
    background: var(--teal-glow);
    border: 1px solid var(--teal);
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  /* ── MAIN LAYOUT ── */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px;
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 28px;
    align-items: start;
  }

  /* ── PANEL ── */
  .panel {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 12px;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--navy-border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--navy-mid);
  }

  .panel-header h2 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
  }

  .panel-body { padding: 20px; }

  /* ── FORM CONTROLS ── */
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  select, textarea {
    width: 100%;
    background: var(--navy);
    border: 1px solid var(--navy-border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, textarea:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-glow);
  }

  select { appearance: none; cursor: pointer; }

  textarea {
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.7;
    resize: vertical;
    min-height: 260px;
  }

  .field { margin-bottom: 20px; }

  /* ── MODEL TOGGLE ── */
  .model-toggle {
    display: flex;
    background: var(--navy);
    border: 1px solid var(--navy-border);
    border-radius: 8px;
    overflow: hidden;
  }

  .model-toggle input[type="radio"] { display: none; }

  .model-toggle label {
    flex: 1;
    text-align: center;
    padding: 9px 0;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: none;
    color: var(--text-muted);
    border-radius: 0;
    transition: all 0.2s;
    border: none;
    margin: 0;
  }

  .model-toggle input[type="radio"]:checked + label {
    background: var(--teal);
    color: var(--navy);
  }

  /* ── SCAN BUTTON ── */
  .scan-btn {
    width: 100%;
    padding: 14px;
    background: var(--teal);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  .scan-btn:hover { background: #00F0C4; }
  .scan-btn:active { transform: scale(0.99); }
  .scan-btn:disabled { background: var(--navy-border); color: var(--text-muted); cursor: not-allowed; }

  .scan-icon { font-size: 18px; }

  /* ── SCAN ANIMATION OVERLAY ── */
  .resume-wrapper { position: relative; }

  .scan-beam {
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--teal), transparent);
    box-shadow: 0 0 20px var(--teal);
    top: 0;
    display: none;
    border-radius: 2px;
    z-index: 10;
  }

  .scanning .scan-beam {
    display: block;
    animation: beam-sweep 1.4s ease-in-out infinite;
  }

  @keyframes beam-sweep {
    0%   { top: 0%; opacity: 1; }
    90%  { top: calc(100% - 3px); opacity: 1; }
    100% { top: calc(100% - 3px); opacity: 0; }
  }

  .scanning textarea {
    opacity: 0.6;
    pointer-events: none;
  }

  /* ── RESULTS PANEL ── */
  #results-panel { display: none; }

  /* ── VERDICT BANNER ── */
  .verdict-banner {
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border: 1px solid;
  }

  .verdict-banner.eligible {
    background: var(--teal-glow);
    border-color: var(--teal);
  }

  .verdict-banner.not-eligible {
    background: var(--red-glow);
    border-color: var(--red);
  }

  .verdict-icon { font-size: 36px; line-height: 1; }

  .verdict-text h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .eligible .verdict-text h3 { color: var(--teal); }
  .not-eligible .verdict-text h3 { color: var(--red); }

  .verdict-text p {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* ── CONFIDENCE BARS ── */
  .confidence-section { margin-bottom: 20px; }
  .confidence-section h4 {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .conf-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .conf-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    width: 80px;
    flex-shrink: 0;
  }

  .conf-bar-track {
    flex: 1;
    height: 6px;
    background: var(--navy);
    border-radius: 3px;
    overflow: hidden;
  }

  .conf-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .conf-bar-fill.eligible-bar { background: var(--teal); box-shadow: 0 0 8px var(--teal); }
  .conf-bar-fill.not-bar { background: var(--red); }

  .conf-pct {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    width: 44px;
    text-align: right;
  }

  /* ── STAT GRID ── */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--navy);
    border: 1px solid var(--navy-border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .stat-card .stat-val {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--teal);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-card .stat-lbl {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }

  /* ── KEYWORD TAGS ── */
  .kw-section { margin-bottom: 18px; }

  .kw-section h4 {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .kw-count {
    font-size: 11px;
    background: var(--navy-border);
    padding: 2px 7px;
    border-radius: 20px;
    font-family: var(--mono);
  }

  .tag-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 4px;
    border: 1px solid;
  }

  .tag.matched   { background: rgba(0,212,170,0.1); border-color: var(--teal); color: var(--teal); }
  .tag.missing   { background: rgba(255,71,87,0.08); border-color: var(--red-dim); color: var(--red); }
  .tag.preferred { background: rgba(255,184,48,0.1); border-color: var(--amber); color: var(--amber); }
  .tag.redflag   { background: rgba(255,71,87,0.15); border-color: var(--red); color: var(--red); font-weight: 600; }
  .tag.empty     { color: var(--text-muted); border-color: var(--navy-border); background: transparent; }

  /* ── RECOMMENDATION ── */
  .rec-box {
    background: var(--navy);
    border-left: 3px solid var(--teal);
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
  }

  .rec-box h4 {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--teal);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* ── SCANNING STATUS ── */
  #scan-status {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--teal);
    text-align: center;
    padding: 10px;
    display: none;
    animation: blink 1s ease-in-out infinite;
  }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--navy-border);
    margin: 18px 0;
  }

  /* ── HISTORY PANEL ── */
  #history-list { max-height: 240px; overflow-y: auto; }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }

  .history-item:hover { background: var(--navy); border-color: var(--navy-border); }

  .history-badge {
    font-size: 14px;
    width: 24px;
    text-align: center;
    flex-shrink: 0;
  }

  .history-info { flex: 1; min-width: 0; }

  .history-role {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  .history-pct {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .history-pct.elig { color: var(--teal); }
  .history-pct.not-elig { color: var(--red); }

  .empty-history {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .empty-history .empty-icon { font-size: 28px; margin-bottom: 8px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; padding: 20px 16px; }
    header { padding: 16px 20px; }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy-mid); }
  ::-webkit-scrollbar-thumb { background: var(--navy-border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--teal-dim); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔍</div>
    <div class="logo-text">Resume<span>AI</span></div>
  </div>
  <div class="header-badge">ML SCREENING SYSTEM v1.0</div>
</header>

<div class="container">

  <!-- LEFT: INPUT PANEL -->
  <div style="display:flex; flex-direction:column; gap:28px;">

    <div class="panel">
      <div class="panel-header">
        <div class="dot"></div>
        <h2>Resume Input</h2>
      </div>
      <div class="panel-body">

        <div class="field">
          <label>Target Role</label>
          <div style="position:relative;">
            <select id="role-select">
              <option value="data_scientist">Data Scientist</option>
              <option value="software_engineer">Software Engineer</option>
              <option value="data_analyst">Data Analyst</option>
            </select>
            <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-muted);">▾</span>
          </div>
        </div>

        <div class="field">
          <label>ML Model</label>
          <div class="model-toggle">
            <input type="radio" name="model" id="lr" value="Logistic Regression" checked>
            <label for="lr">Logistic Regression</label>
            <input type="radio" name="model" id="svm" value="SVM">
            <label for="svm">SVM (RBF Kernel)</label>
            <input type="radio" name="model" id="both" value="both">
            <label for="both">Both</label>
          </div>
        </div>

        <div class="field">
          <label>Resume Text</label>
          <div class="resume-wrapper" id="resume-wrapper">
            <div class="scan-beam" id="scan-beam"></div>
            <textarea id="resume-input" placeholder="Paste the candidate's resume text here...

Example:
PhD in Computer Science. 7 years of experience in machine learning and data analysis. Proficient in Python, TensorFlow, PyTorch, scikit-learn, SQL, pandas, and numpy. Extensive experience with deep learning, NLP, and computer vision. Led a team of 5 data scientists. AWS Certified ML Specialist."></textarea>
          </div>
        </div>

        <div id="scan-status">⟳ SCANNING RESUME — RUNNING ML INFERENCE...</div>

        <button class="scan-btn" id="scan-btn" onclick="runScan()">
          <span class="scan-icon">⬡</span>
          SCAN RESUME
        </button>

      </div>
    </div>

    <!-- RESULTS (shown after scan) -->
    <div class="panel" id="results-panel">
      <div class="panel-header">
        <div class="dot" id="result-dot"></div>
        <h2 id="results-title">Screening Results</h2>
      </div>
      <div class="panel-body" id="results-body"></div>
    </div>

  </div>

  <!-- RIGHT: SIDEBAR -->
  <div style="display:flex; flex-direction:column; gap:28px;">

    <!-- KEYWORD REFERENCE -->
    <div class="panel">
      <div class="panel-header">
        <div class="dot"></div>
        <h2>Keyword Reference</h2>
      </div>
      <div class="panel-body" id="keyword-ref-body" style="padding:16px 20px;"></div>
    </div>

    <!-- SCAN HISTORY -->
    <div class="panel">
      <div class="panel-header">
        <div class="dot"></div>
        <h2>Scan History</h2>
      </div>
      <div style="padding:12px;" id="history-list">
        <div class="empty-history">
          <div class="empty-icon">📋</div>
          No scans yet. Submit a resume to begin.
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ── KEYWORD CONFIG (mirrors Python backend) ──────────────────
const ROLE_CONFIG = {
  data_scientist: {
    must_have: ["python","machine learning","deep learning","statistics","data analysis","sql","tensorflow","pytorch","scikit-learn","numpy","pandas","model training","neural network"],
    preferred: ["nlp","computer vision","xgboost","spark","hadoop","azure","aws","gcp","docker","kubernetes","a/b testing","experiment design","tableau","power bi","feature engineering","hyperparameter tuning","mlops"],
    red_flags: ["no experience","beginner","basic knowledge only","unfamiliar with","no programming"],
    min_exp: 2
  },
  software_engineer: {
    must_have: ["java","python","c++","javascript","algorithms","data structures","git","rest api","unit testing","object oriented","agile","code review"],
    preferred: ["react","node.js","spring boot","microservices","ci/cd","docker","kubernetes","aws","gcp","azure","graphql","redis","postgresql","mongodb","kafka"],
    red_flags: ["no coding experience","non-technical","no version control"],
    min_exp: 1
  },
  data_analyst: {
    must_have: ["sql","excel","data analysis","reporting","dashboard","python","r","visualization","kpi","business intelligence"],
    preferred: ["tableau","power bi","looker","dax","etl","google analytics","a/b testing","forecasting","pivot tables","vlookup","statistical analysis"],
    red_flags: ["no data experience","no sql","non-analytical"],
    min_exp: 1
  }
};

const ROLE_LABELS = {
  data_scientist: "Data Scientist",
  software_engineer: "Software Engineer",
  data_analyst: "Data Analyst"
};

let scanHistory = [];

// ── KEYWORD REFERENCE PANEL ──────────────────────────────────
function updateKeywordRef() {
  const role = document.getElementById('role-select').value;
  const cfg = ROLE_CONFIG[role];
  const body = document.getElementById('keyword-ref-body');

  body.innerHTML = `
    <div class="kw-section">
      <h4>Must-Have <span class="kw-count">${cfg.must_have.length}</span></h4>
      <div class="tag-wrap">${cfg.must_have.map(k => `<span class="tag matched">${k}</span>`).join('')}</div>
    </div>
    <div class="divider"></div>
    <div class="kw-section">
      <h4>Preferred <span class="kw-count">${cfg.preferred.length}</span></h4>
      <div class="tag-wrap">${cfg.preferred.map(k => `<span class="tag preferred">${k}</span>`).join('')}</div>
    </div>
    <div class="divider"></div>
    <div class="kw-section">
      <h4>Red Flags <span class="kw-count">${cfg.red_flags.length}</span></h4>
      <div class="tag-wrap">${cfg.red_flags.map(k => `<span class="tag redflag">⚑ ${k}</span>`).join('')}</div>
    </div>
  `;
}

document.getElementById('role-select').addEventListener('change', updateKeywordRef);
updateKeywordRef();

// ── FEATURE EXTRACTION (mirrors Python backend) ──────────────
function extractYearsExp(text) {
  const patterns = [
    /(\d+)\+?\s*years?\s+of\s+experience/gi,
    /(\d+)\+?\s*years?\s+experience/gi,
    /experience\s+of\s+(\d+)\+?\s*years?/gi,
    /(\d+)\+?\s*yrs?\s+of\s+experience/gi,
  ];
  let found = [];
  for (const p of patterns) {
    const m = [...text.matchAll(p)];
    found.push(...m.map(x => parseInt(x[1])));
  }
  return found.length ? Math.max(...found) : 0;
}

function extractEdScore(text) {
  const t = text.toLowerCase();
  const h = { "phd":4,"ph.d":4,"doctorate":4,"master":3,"m.s":3,"msc":3,"m.tech":3,"mba":3,"bachelor":2,"b.s":2,"b.e":2,"b.tech":2,"undergraduate":2,"diploma":1,"associate":1,"high school":0.5,"secondary":0.5 };
  let score = 0;
  for (const [kw, val] of Object.entries(h)) if (t.includes(kw)) score = Math.max(score, val);
  return score;
}

function analyzeResume(text, role) {
  const t = text.toLowerCase();
  const cfg = ROLE_CONFIG[role];

  const matchedMust    = cfg.must_have.filter(k => t.includes(k));
  const missingMust    = cfg.must_have.filter(k => !t.includes(k));
  const matchedPref    = cfg.preferred.filter(k => t.includes(k));
  const redFlagsFound  = cfg.red_flags.filter(k => t.includes(k));

  const mustRatio = matchedMust.length / cfg.must_have.length;
  const prefRatio = matchedPref.length / cfg.preferred.length;
  const yearsExp  = extractYearsExp(text);
  const eduScore  = extractEdScore(text);

  const certs = ["certified","certification","aws certified","google certified","pmp","cfa","cpa","ccna","comptia"];
  const certCount = certs.filter(k => t.includes(k)).length;
  const wordCount = text.trim().split(/\s+/).length;

  const score = mustRatio * 0.5 + prefRatio * 0.3 + (eduScore / 4) * 0.1 + Math.min(yearsExp / 10, 0.1) - redFlagsFound.length * 0.15;
  const clampedScore = Math.max(0, Math.min(1, score));

  return { matchedMust, missingMust, matchedPref, redFlagsFound, mustRatio, prefRatio, yearsExp, eduScore, certCount, wordCount, score: clampedScore, meetsMinExp: yearsExp >= cfg.min_exp };
}

// ── LOGISTIC REGRESSION SIMULATION ──────────────────────────
function logisticRegPredict(features) {
  const { mustRatio, prefRatio, score, meetsMinExp, redFlagsFound, yearsExp } = features;
  // Weighted log-odds simulating trained LR weights
  const logit = -2.5
    + mustRatio * 7.0
    + prefRatio * 3.5
    + (meetsMinExp ? 1.2 : 0)
    + Math.min(yearsExp / 8, 1) * 2.0
    + features.eduScore * 0.4
    + features.certCount * 0.3
    - redFlagsFound.length * 2.5
    + (features.wordCount > 80 ? 0.3 : -0.5);
  const prob = 1 / (1 + Math.exp(-logit));
  return { prob: Math.round(prob * 10000) / 10000, eligible: prob >= 0.5 };
}

// ── SVM SIMULATION ──────────────────────────────────────────
function svmPredict(features) {
  // RBF SVM — more sensitive to outliers / red flags
  const { mustRatio, prefRatio, redFlagsFound, yearsExp, meetsMinExp, eduScore } = features;
  const baseScore = mustRatio * 0.55 + prefRatio * 0.25 + (meetsMinExp ? 0.08 : 0) + Math.min(yearsExp / 12, 0.08) + (eduScore / 4) * 0.04;
  const penalty = redFlagsFound.length * 0.18;
  const rawProb = Math.max(0, Math.min(1, baseScore - penalty));
  // RBF sharpening (non-linear decision)
  const prob = rawProb < 0.5 ? rawProb * rawProb * 4 * 0.5 : 1 - Math.pow(1 - rawProb, 2);
  const finalProb = Math.round(prob * 10000) / 10000;
  return { prob: finalProb, eligible: finalProb >= 0.5 };
}

function buildRecommendation(eligible, prob, features) {
  const lines = [];
  if (eligible) {
    if (prob >= 0.80) lines.push("Strong candidate — recommend moving to interview stage immediately.");
    else if (prob >= 0.60) lines.push("Suitable candidate — proceed with a technical screening call.");
    else lines.push("Borderline eligible — consider a short assessment before deciding.");
  } else {
    if (prob <= 0.25) lines.push("Clearly under-qualified — recommend rejection.");
    else lines.push("Candidate does not meet the minimum bar at this time.");
  }
  if (features.missingMust.length) lines.push(`Missing critical keywords: ${features.missingMust.slice(0,5).join(', ')}.`);
  if (features.redFlagsFound.length) lines.push(`Red flags detected: ${features.redFlagsFound.join(', ')}.`);
  if (features.yearsExp === 0) lines.push("No verifiable work experience found in resume.");
  return lines.join(' ');
}

// ── RENDER RESULT CARD ───────────────────────────────────────
function renderResult(modelName, pred, features, role) {
  const eligible = pred.eligible;
  const prob = pred.prob;
  const pct = (prob * 100).toFixed(1);
  const notPct = ((1 - prob) * 100).toFixed(1);
  const rec = buildRecommendation(eligible, prob, features);

  const edLabels = { 0:'None', 0.5:'High School', 1:'Diploma', 2:'Bachelor', 3:'Master/MBA', 4:'PhD' };
  const eduLabel = edLabels[features.eduScore] || `Score ${features.eduScore}`;

  return `
    <div style="margin-bottom:20px;">
      <div style="font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;">[ ${modelName} ]</div>

      <div class="verdict-banner ${eligible ? 'eligible' : 'not-eligible'}">
        <div class="verdict-icon">${eligible ? '✅' : '❌'}</div>
        <div class="verdict-text">
          <h3>${eligible ? 'ELIGIBLE' : 'NOT ELIGIBLE'}</h3>
          <p>Eligibility probability: <strong>${pct}%</strong> · Role: ${ROLE_LABELS[role]}</p>
        </div>
      </div>

      <div class="confidence-section">
        <h4>Confidence Scores</h4>
        <div class="conf-row">
          <span class="conf-label">Eligible</span>
          <div class="conf-bar-track"><div class="conf-bar-fill eligible-bar" data-width="${pct}" style="width:0%"></div></div>
          <span class="conf-pct" style="color:var(--teal)">${pct}%</span>
        </div>
        <div class="conf-row">
          <span class="conf-label">Not Eligible</span>
          <div class="conf-bar-track"><div class="conf-bar-fill not-bar" data-width="${notPct}" style="width:0%"></div></div>
          <span class="conf-pct" style="color:var(--red)">${notPct}%</span>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-val">${features.matchedMust.length}<span style="font-size:14px;color:var(--text-muted)">/${features.matchedMust.length + features.missingMust.length}</span></div>
          <div class="stat-lbl">Must-have matched</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${features.matchedPref.length}<span style="font-size:14px;color:var(--text-muted)">/${features.matchedPref.length + (ROLE_CONFIG[role].preferred.length - features.matchedPref.length)}</span></div>
          <div class="stat-lbl">Preferred matched</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="${features.yearsExp >= ROLE_CONFIG[role].min_exp ? 'color:var(--teal)' : 'color:var(--red)'}">${features.yearsExp}<span style="font-size:14px;color:var(--text-muted)"> yrs</span></div>
          <div class="stat-lbl">Experience (min ${ROLE_CONFIG[role].min_exp})</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="font-size:16px;">${eduLabel}</div>
          <div class="stat-lbl">Education level</div>
        </div>
      </div>

      <div class="kw-section">
        <h4>✓ Must-Have Matched <span class="kw-count">${features.matchedMust.length}</span></h4>
        <div class="tag-wrap">${features.matchedMust.length ? features.matchedMust.map(k=>`<span class="tag matched">${k}</span>`).join('') : '<span class="tag empty">None matched</span>'}</div>
      </div>

      <div class="kw-section">
        <h4>✗ Must-Have Missing <span class="kw-count">${features.missingMust.length}</span></h4>
        <div class="tag-wrap">${features.missingMust.length ? features.missingMust.map(k=>`<span class="tag missing">${k}</span>`).join('') : '<span class="tag empty">All matched ✓</span>'}</div>
      </div>

      <div class="kw-section">
        <h4>★ Preferred Matched <span class="kw-count">${features.matchedPref.length}</span></h4>
        <div class="tag-wrap">${features.matchedPref.length ? features.matchedPref.map(k=>`<span class="tag preferred">${k}</span>`).join('') : '<span class="tag empty">None matched</span>'}</div>
      </div>

      ${features.redFlagsFound.length ? `
      <div class="kw-section">
        <h4>⚑ Red Flags Detected <span class="kw-count">${features.redFlagsFound.length}</span></h4>
        <div class="tag-wrap">${features.redFlagsFound.map(k=>`<span class="tag redflag">⚑ ${k}</span>`).join('')}</div>
      </div>` : ''}

      <div class="rec-box">
        <h4>🤖 AI Recommendation</h4>
        ${rec}
      </div>
    </div>
  `;
}

// ── MAIN SCAN FUNCTION ───────────────────────────────────────
function runScan() {
  const text = document.getElementById('resume-input').value.trim();
  const role = document.getElementById('role-select').value;
  const modelVal = document.querySelector('input[name="model"]:checked').value;

  if (!text) {
    document.getElementById('resume-input').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('resume-input').style.borderColor = '', 1500);
    return;
  }

  // Scan animation
  const wrapper = document.getElementById('resume-wrapper');
  const statusEl = document.getElementById('scan-status');
  const btn = document.getElementById('scan-btn');

  wrapper.classList.add('scanning');
  statusEl.style.display = 'block';
  btn.disabled = true;
  btn.innerHTML = `<span class="scan-icon">⟳</span> SCANNING...`;

  setTimeout(() => {
    wrapper.classList.remove('scanning');
    statusEl.style.display = 'none';
    btn.disabled = false;
    btn.innerHTML = `<span class="scan-icon">⬡</span> SCAN RESUME`;

    const features = analyzeResume(text, role);
    const lrPred  = logisticRegPredict(features);
    const svmPred = svmPredict(features);

    let resultsHTML = '';
    if (modelVal === 'Logistic Regression') {
      resultsHTML = renderResult('Logistic Regression', lrPred, features, role);
    } else if (modelVal === 'SVM') {
      resultsHTML = renderResult('SVM (RBF Kernel)', svmPred, features, role);
    } else {
      resultsHTML = renderResult('Logistic Regression', lrPred, features, role)
                  + `<div class="divider"></div>`
                  + renderResult('SVM (RBF Kernel)', svmPred, features, role);
    }

    const panel = document.getElementById('results-panel');
    const body  = document.getElementById('results-body');
    body.innerHTML = resultsHTML;
    panel.style.display = 'block';

    // Animate bars
    setTimeout(() => {
      document.querySelectorAll('.conf-bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.width + '%';
      });
    }, 100);

    // Determine primary result (use LR for history)
    const primary = modelVal === 'SVM' ? svmPred : lrPred;
    const dot = document.getElementById('result-dot');
    dot.style.background = primary.eligible ? 'var(--teal)' : 'var(--red)';
    dot.style.boxShadow  = primary.eligible ? '0 0 8px var(--teal)' : '0 0 8px var(--red)';

    document.getElementById('results-title').textContent =
      primary.eligible ? 'Result — Eligible Candidate' : 'Result — Not Eligible';

    // Scroll to results
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Add to history
    addHistory(role, modelVal, primary, text.slice(0, 60));
  }, 2000);
}

// ── HISTORY ──────────────────────────────────────────────────
function addHistory(role, model, pred, preview) {
  scanHistory.unshift({ role, model, pred, preview, time: new Date() });
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!scanHistory.length) {
    el.innerHTML = `<div class="empty-history"><div class="empty-icon">📋</div>No scans yet.</div>`;
    return;
  }

  el.innerHTML = scanHistory.slice(0, 8).map((h, i) => `
    <div class="history-item" onclick="restoreHistory(${i})">
      <div class="history-badge">${h.pred.eligible ? '✅' : '❌'}</div>
      <div class="history-info">
        <div class="history-role">${ROLE_LABELS[h.role]}</div>
        <div class="history-meta">${h.model} · ${h.time.toLocaleTimeString()}</div>
      </div>
      <div class="history-pct ${h.pred.eligible ? 'elig' : 'not-elig'}">${(h.pred.prob * 100).toFixed(0)}%</div>
    </div>
  `).join('');
}

// ── ENTER KEY SUPPORT ────────────────────────────────────────
document.getElementById('resume-input').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') runScan();
});
</script>
</body>
</html>
